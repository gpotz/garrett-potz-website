<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600&display=swap');
  body {
    font-family: 'Inter', sans-serif;
    background: #161616;
    color: #f6f5f5;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .red-bar {
    height: 7px;
    background: #850000;
    width: 100%;
    flex-shrink: 0;
  }
  .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 80px 32px;
    position: relative;
  }
  .accent-block {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 320px;
    background: #1a0808;
  }
  .watermark {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Fraunces', serif;
    font-size: 160px;
    color: #850000;
    opacity: 0.15;
    font-weight: 700;
    font-style: italic;
    line-height: 1;
    user-select: none;
  }
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #d64545;
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .headline {
    font-family: 'Fraunces', serif;
    font-size: 46px;
    color: #f6f5f5;
    line-height: 1.18;
    font-weight: 700;
    max-width: 740px;
    margin-bottom: 28px;
  }
  .sub {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    color: #909090;
    line-height: 1.55;
    max-width: 680px;
  }
  .footer {
    padding: 20px 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,.09);
    flex-shrink: 0;
  }
  .name-block {}
  .name {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: #f6f5f5;
    font-weight: 400;
    letter-spacing: .01em;
  }
  .company {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #5d5d5d;
    margin-top: 4px;
    letter-spacing: .03em;
  }
  .badge {
    background: #850000;
    color: #f6f5f5;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 3px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="red-bar"></div>
  <div class="body">
    <div class="accent-block"></div>
    <div class="watermark">GP</div>
    <div class="eyebrow">garrettpotz.com</div>
    <div class="headline">Independent Mortgage Broker Serving GA, FL, AL, TN &amp; SC</div>
    <div class="sub">45 wholesale lenders. 5 states. One trusted advisor. Bank Statement, DSCR, 1099, conventional, VA and more.</div>
  </div>
  <div class="footer">
    <div class="name-block">
      <div class="name">Garrett Potz</div>
      <div class="company">Affinity Home Lending &nbsp;·&nbsp; NMLS #631592 &nbsp;·&nbsp; (770) 401-1759</div>
    </div>
    <div class="badge">Woodstock, GA</div>
  </div>
</body>
</html>
